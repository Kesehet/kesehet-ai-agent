<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Kesehet AI Agent</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
	<canvas class="node-field" id="node-field" aria-hidden="true"></canvas>
	<div class="top-strip">
		<div class="brand">Kesehet AI Agent</div>
		<div class="status" id="global-status">Idle</div>
	</div>

	<main class="desktop" id="desktop">
		<div class="empty-hint" id="empty-hint">Start a new task from the command box below. Each task opens as its own workspace window.</div>
	</main>

	<div class="dock" id="dock"></div>

	<section class="scheduler-widget" id="scheduler-widget">
		<button class="scheduler-toggle" id="scheduler-toggle" type="button" aria-expanded="false">
			<span class="scheduler-dot" id="scheduler-dot"></span>
			<span id="scheduler-count">0</span>
		</button>
		<div class="scheduler-panel" id="scheduler-panel" hidden>
			<div class="scheduler-panel-head">
				<div>
					<div class="scheduler-title">Scheduler</div>
					<div class="scheduler-subtitle" id="scheduler-updated">Not loaded</div>
				</div>
			</div>
			<div class="scheduler-section">
				<div class="scheduler-section-title">Running</div>
				<div class="scheduler-list" id="scheduler-running"></div>
			</div>
			<div class="scheduler-section">
				<div class="scheduler-section-title">Upcoming</div>
				<div class="scheduler-list" id="scheduler-upcoming"></div>
			</div>
			<div class="scheduler-section">
				<div class="scheduler-section-title">Recent</div>
				<div class="scheduler-list" id="scheduler-recent"></div>
			</div>
		</div>
	</section>

	<form class="launcher" id="launcher-form">
		<textarea class="textbox" id="launcher-input" rows="1" placeholder="Start a new task..."></textarea>
		<button class="send-button" id="launcher-button" type="submit" title="Start task" aria-label="Start task">GO</button>
	</form>

	<div class="error-toast" id="error-toast"></div>

	<script src="{{ url_for('static', filename='js/index.js') }}" defer></script>
</body>
</html>
